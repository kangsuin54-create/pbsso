<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>물결의 움직임</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e27; overflow: hidden; touch-action: none; }
  #canvas {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    touch-action: none;
  }
  #header {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 12px; text-align: center;
    background: rgba(10,14,39,0.7);
    z-index: 10; pointer-events: none;
  }
  h1 { font-size: 16px; color: #f4c95d; font-family: Arial, sans-serif; }
  #hint { font-size: 11px; color: #aaa; margin-top: 3px; font-family: Arial, sans-serif; }
  #hud {
    position: fixed; top: 56px; left: 0; right: 0;
    display: flex; justify-content: space-around;
    padding: 4px 16px; z-index: 10; pointer-events: none;
  }
  .hud-item { font-size: 14px; color: #f4c95d; font-family: Arial, sans-serif; font-weight: bold; }
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,14,39,0.92);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
  }
  #overlay.show { display: flex; }
  #overlay h2 { font-size: 24px; color: #f4c95d; margin-bottom: 12px; text-align: center; font-family: Arial, sans-serif; }
  #overlay p { font-size: 13px; color: #ccc; margin-bottom: 24px; text-align: center; font-family: Arial, sans-serif; }
  .btn {
    background: #f4c95d; color: #0a0e27;
    border: none; border-radius: 24px;
    padding: 12px 32px; font-size: 16px; font-weight: bold;
    cursor: pointer; font-family: Arial, sans-serif;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="header">
  <h1>💧 물결의 움직임</h1>
  <div id="hint">구슬을 드래그해서 장애물을 피하세요!</div>
</div>
<div id="hud">
  <span class="hud-item">통과: <span id="scoreDisplay">0</span>/5</span>
  <span class="hud-item">⏱ <span id="timeDisplay">7</span>초</span>
</div>
<div id="overlay">
  <h2 id="overlayTitle"></h2>
  <p id="overlayMsg"></p>
  <button class="btn" id="overlayBtn">다시 도전! 💪</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg = document.getElementById('overlayMsg');
const overlayBtn = document.getElementById('overlayBtn');
const scoreDisplay = document.getElementById('scoreDisplay');
const timeDisplay = document.getElementById('timeDisplay');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (!gameRunning) {
    player.x = W / 2;
    player.y = H - 100;
  }
}

let player = { x: 0, y: 0, r: 18, dragging: false };
let obstacles = [];
let score = 0;
let gameRunning = false;
let gameOver = false;
let timeLeft = 7;
let lastTime = 0;
let obstacleTimer = 0;
let shakeTime = 0;
let shakeX = 0;
let rafId = null;

// ── 좌표: canvas는 (0,0)부터 시작하므로 clientX/Y 직접 사용 ──
function getPos(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameOver) return;
  const p = getPos(e);
  const dx = p.x - player.x, dy = p.y - player.y;
  if (Math.sqrt(dx * dx + dy * dy) < player.r + 30) player.dragging = true;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (player.dragging) {
    const p = getPos(e);
    player.x = Math.max(player.r, Math.min(W - player.r, p.x));
    player.y = Math.max(player.r, Math.min(H - player.r, p.y));
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  player.dragging = false;
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  if (gameOver) return;
  const dx = e.clientX - player.x, dy = e.clientY - player.y;
  if (Math.sqrt(dx * dx + dy * dy) < player.r + 30) player.dragging = true;
});
canvas.addEventListener('mousemove', e => {
  if (player.dragging) {
    player.x = Math.max(player.r, Math.min(W - player.r, e.clientX));
    player.y = Math.max(player.r, Math.min(H - player.r, e.clientY));
  }
});
canvas.addEventListener('mouseup', () => { player.dragging = false; });

function spawnObstacle() {
  const x = Math.random() * (W - 80) + 40;
  obstacles.push({ x, y: -20, w: 50, h: 18, passed: false });
}

function checkCollision(obs) {
  const cx = Math.max(obs.x - obs.w / 2, Math.min(player.x, obs.x + obs.w / 2));
  const cy = Math.max(obs.y - obs.h / 2, Math.min(player.y, obs.y + obs.h / 2));
  const dx = player.x - cx, dy = player.y - cy;
  return dx * dx + dy * dy < player.r * player.r;
}

function showOverlay(title, msg, isSuccess) {
  overlayTitle.textContent = title;
  overlayMsg.textContent = msg;
  overlayBtn.style.display = isSuccess ? 'none' : 'block';
  overlay.classList.add('show');
}

function reset() {
  obstacles = [];
  score = 0;
  timeLeft = 7;
  gameOver = false;
  shakeTime = 0;
  shakeX = 0;
  obstacleTimer = 0;
  player.x = W / 2;
  player.y = H - 100;
  player.dragging = false;
  overlay.classList.remove('show');
  lastTime = 0;
  gameRunning = true;
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(loop);
}

overlayBtn.addEventListener('click', reset);

// 별 위치 미리 계산
const stars = Array.from({ length: 40 }, () => ({
  x: Math.random(), y: Math.random(), s: Math.random() * 1.5 + 0.5
}));

function loop(ts) {
  if (gameOver) return;
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  timeLeft -= dt;
  obstacleTimer += dt;

  if (obstacleTimer > 0.85) {
    spawnObstacle();
    obstacleTimer = 0;
  }

  let hit = false;
  obstacles.forEach(obs => {
    obs.y += 130 * dt;
    if (!obs.passed && obs.y > player.y + player.r) {
      obs.passed = true;
      score++;
      scoreDisplay.textContent = score;
    }
    if (checkCollision(obs) && shakeTime <= 0) {
      hit = true;
    }
  });
  obstacles = obstacles.filter(o => o.y < H + 40);

  if (hit) {
    shakeTime = 0.35;
  }
  if (shakeTime > 0) {
    shakeTime -= dt;
    shakeX = (Math.random() - 0.5) * 12;
    if (shakeTime <= 0) {
      shakeX = 0;
      gameOver = true;
      showOverlay('아쉬워요! 😅', '장애물에 부딪혔어요. 다시 해봐요!', false);
      return;
    }
  }

  if (score >= 5) {
    gameOver = true;
    showOverlay('물처럼 유연하게! ✨', '5개 장애물을 모두 통과했어요!', true);
    setTimeout(() => window.parent.postMessage({ type: 'MINIGAME_COMPLETE', success: true }, '*'), 1200);
    return;
  }
  if (timeLeft <= 0) {
    gameOver = true;
    showOverlay('시간 초과! ⏱', `${score}개 통과했어요. 5개가 목표예요!`, false);
    return;
  }

  timeDisplay.textContent = Math.max(0, Math.ceil(timeLeft));

  // ── 렌더 ──
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(shakeX, 0);

  // 별
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.s, 0, Math.PI * 2);
    ctx.fill();
  });

  // 장애물
  obstacles.forEach(obs => {
    ctx.save();
    ctx.fillStyle = '#546e7a';
    ctx.strokeStyle = '#90a4ae';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(obs.x - obs.w / 2, obs.y - obs.h / 2, obs.w, obs.h, 4);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  });

  // 구슬 글로우
  const glow = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.r + 12);
  glow.addColorStop(0, 'rgba(79,195,247,0.3)');
  glow.addColorStop(1, 'rgba(79,195,247,0)');
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r + 12, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // 구슬
  const grad = ctx.createRadialGradient(player.x - 5, player.y - 5, 2, player.x, player.y, player.r);
  grad.addColorStop(0, '#e1f5fe');
  grad.addColorStop(0.5, '#4fc3f7');
  grad.addColorStop(1, '#0277bd');
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#80d8ff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 드래그 중 트레일 (작은 원)
  if (player.dragging) {
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r + 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(129,212,250,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  ctx.restore();
  rafId = requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
resize();
reset();
</script>
</body>
</html>
