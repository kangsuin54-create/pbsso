<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>괜찮아 잘될거야</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e27;
    color: #f4c95d;
    font-family: 'Segoe UI', sans-serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
    touch-action: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 24px;
    user-select: none;
  }
  .round-dots {
    display: flex;
    gap: 10px;
  }
  .dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #2a3060;
    transition: background 0.3s;
  }
  .dot.done { background: #f4c95d; }
  .scene-card {
    background: #12183a;
    border: 2px solid #2a3060;
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
    width: 100%;
    max-width: 300px;
  }
  .scene-icon { font-size: 3.5rem; margin-bottom: 12px; }
  .scene-text { font-size: 1.1rem; color: #ddd; line-height: 1.5; }
  .npc-area {
    font-size: 3rem;
    transition: transform 0.4s;
    min-height: 60px;
    display: flex; align-items: center; justify-content: center;
  }
  .npc-area.standup {
    animation: standUp 0.6s ease;
  }
  @keyframes standUp {
    0%   { transform: translateY(12px) rotate(-10deg); opacity: 0.5; }
    60%  { transform: translateY(-10px) rotate(4deg); opacity: 1; }
    100% { transform: translateY(0) rotate(0deg); }
  }
  .btn-ok {
    padding: 14px 36px;
    background: #f4c95d;
    color: #0a0e27;
    border: none;
    border-radius: 14px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    touch-action: auto;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-ok:active { opacity: 0.8; }
  .round-label { font-size: 0.82rem; color: #888; }
  .success-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,14,39,0.93);
    flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    gap: 16px;
  }
  .success-overlay.show { display: flex; }
  .success-msg { font-size: 1.4rem; color: #f4c95d; text-align: center; }
  .btn-retry {
    padding: 12px 28px;
    background: #f4c95d;
    color: #0a0e27;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    touch-action: auto;
  }
</style>
</head>
<body>
<div class="round-dots">
  <div class="dot" id="dot0"></div>
  <div class="dot" id="dot1"></div>
  <div class="dot" id="dot2"></div>
</div>
<div class="round-label" id="roundLabel">라운드 1 / 3</div>
<div class="scene-card">
  <div class="scene-icon" id="sceneIcon">😰</div>
  <div class="scene-text" id="sceneText">컵을 떨어뜨렸어</div>
</div>
<div class="npc-area" id="npcArea">🧙</div>
<button class="btn-ok" id="okBtn">누구나 실수할 수 있어! 🌱</button>
<div class="success-overlay" id="successOverlay">
  <div style="font-size:3rem;">🌱</div>
  <div class="success-msg">실수해도 괜찮아! 🌱<br>다시 일어날 수 있어요!</div>
  <button class="btn-retry" onclick="resetGame()">다시 도전! 💪</button>
</div>
<script>
  const SCENES = [
    { icon:'😰', text:'컵을 떨어뜨렸어' },
    { icon:'😣', text:'시험을 망쳤어' },
    { icon:'😢', text:'친구와 싸웠어' },
  ];
  let round = 0, locked = false;

  function loadRound() {
    const s = SCENES[round];
    document.getElementById('sceneIcon').textContent = s.icon;
    document.getElementById('sceneText').textContent = s.text;
    document.getElementById('roundLabel').textContent = `라운드 ${round+1} / 3`;
    document.getElementById('npcArea').textContent = '🧙';
    document.getElementById('npcArea').classList.remove('standup');
    locked = false;
  }

  function tapOk() {
    if (locked) return;
    locked = true;
    const npc = document.getElementById('npcArea');
    npc.textContent = '🎉';
    npc.classList.remove('standup');
    void npc.offsetWidth;
    npc.classList.add('standup');
    document.getElementById('dot'+round).classList.add('done');
    setTimeout(() => {
      round++;
      if (round >= 3) {
        document.getElementById('successOverlay').classList.add('show');
        window.parent.postMessage({ type: 'MINIGAME_COMPLETE', success: true }, '*');
      } else {
        loadRound();
      }
    }, 900);
  }

  function resetGame() {
    round = 0;
    document.querySelectorAll('.dot').forEach(d=>d.classList.remove('done'));
    document.getElementById('successOverlay').classList.remove('show');
    loadRound();
  }

  const btn = document.getElementById('okBtn');
  btn.addEventListener('click', tapOk);
  btn.addEventListener('touchend', e => { e.preventDefault(); tapOk(); }, {passive:false});

  loadRound();
</script>
</body>
</html>
