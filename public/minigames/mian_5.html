<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>셀프 칭찬</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e27;
    color: #f4c95d;
    font-family: 'Segoe UI', sans-serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  h1 { font-size: 1.3rem; text-align: center; margin-bottom: 6px; }
  .subtitle { font-size: 0.82rem; color: #aaa; text-align: center; margin-bottom: 30px; }
  .char-zone {
    position: relative;
    width: 120px; height: 120px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 50px;
  }
  .char-emoji { font-size: 4.5rem; transition: transform 0.3s; z-index: 2; position: relative; }
  .char-emoji.glow {
    animation: glowPulse 0.6s ease;
  }
  @keyframes glowPulse {
    0%,100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.25); filter: brightness(1.5) drop-shadow(0 0 16px #f4c95d); }
  }
  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 1.4rem;
    z-index: 3;
    animation: sparkleFly 0.9s ease forwards;
  }
  @keyframes sparkleFly {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx),var(--ty)) scale(0.2); }
  }
  .drop-hint {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 3px dashed #f4c95d55;
    animation: hintPulse 1.4s ease infinite;
  }
  @keyframes hintPulse {
    0%,100% { border-color: #f4c95d55; }
    50%  { border-color: #f4c95dcc; }
  }
  .badge {
    width: 80px; height: 50px;
    background: linear-gradient(135deg, #f4c95d, #e67e22);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.95rem; font-weight: bold; color: #0a0e27;
    cursor: grab;
    box-shadow: 0 4px 16px rgba(244,201,93,0.45);
    position: fixed;
    z-index: 20;
    touch-action: none;
  }
  .badge.dragging { cursor: grabbing; box-shadow: 0 8px 24px rgba(244,201,93,0.7); }
  .hint-text { font-size: 0.82rem; color: #aaa; text-align: center; margin-top: 8px; }
  .success-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,14,39,0.94);
    flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    gap: 18px;
  }
  .success-overlay.show { display: flex; }
  .success-msg { font-size: 1.8rem; color: #f4c95d; text-align: center; }
  .btn-retry {
    padding: 12px 28px;
    background: #f4c95d;
    color: #0a0e27;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    touch-action: auto;
  }
</style>
</head>
<body>
<h1>🏅 셀프 칭찬</h1>
<p class="subtitle">배지를 드래그해서 캐릭터에게 달아줘요!</p>
<div class="char-zone" id="charZone">
  <div class="drop-hint"></div>
  <div class="char-emoji" id="charEmoji">🧙</div>
</div>
<p class="hint-text">아래 ⭐ 배지를 위로 드래그하세요</p>
<div class="badge" id="badge">⭐ 칭찬 배지</div>
<div class="success-overlay" id="successOverlay">
  <div style="font-size:3.5rem;">🌟</div>
  <div class="success-msg">잘했어, 나! ⭐</div>
  <button class="btn-retry" onclick="resetGame()">다시 도전! 💪</button>
</div>
<script>
  const badge = document.getElementById('badge');
  const charZone = document.getElementById('charZone');
  const charEmoji = document.getElementById('charEmoji');
  let isDragging = false, startX, startY, initLeft, initTop, completed = false;

  function placeInitBadge() {
    const bw = 80, bh = 50;
    badge.style.left = (window.innerWidth/2 - bw/2) + 'px';
    badge.style.top  = (window.innerHeight*0.78 - bh/2) + 'px';
  }
  placeInitBadge();

  function getCenter() {
    const r = charZone.getBoundingClientRect();
    return { x: r.left + r.width/2, y: r.top + r.height/2 };
  }

  function onStart(clientX, clientY) {
    if (completed) return;
    isDragging = true;
    startX = clientX; startY = clientY;
    initLeft = parseInt(badge.style.left);
    initTop  = parseInt(badge.style.top);
    badge.classList.add('dragging');
  }

  function onMove(clientX, clientY) {
    if (!isDragging) return;
    badge.style.left = (initLeft + clientX - startX) + 'px';
    badge.style.top  = (initTop  + clientY - startY) + 'px';
  }

  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    badge.classList.remove('dragging');
    const bRect = badge.getBoundingClientRect();
    const bCx = bRect.left + bRect.width/2;
    const bCy = bRect.top  + bRect.height/2;
    const cen = getCenter();
    const dist = Math.hypot(bCx - cen.x, bCy - cen.y);
    if (dist < 70) {
      completed = true;
      badge.style.display = 'none';
      showSparkles(cen);
      charEmoji.classList.add('glow');
      setTimeout(() => {
        document.getElementById('successOverlay').classList.add('show');
        window.parent.postMessage({ type: 'MINIGAME_COMPLETE', success: true }, '*');
      }, 900);
    }
  }

  function showSparkles(cen) {
    const emojis = ['✨','⭐','💫','🌟'];
    for (let i=0;i<10;i++) {
      const el = document.createElement('div');
      el.className = 'sparkle';
      el.textContent = emojis[i%emojis.length];
      const angle = Math.random()*Math.PI*2;
      const r = 60 + Math.random()*60;
      el.style.cssText = `left:${cen.x}px;top:${cen.y}px;--tx:${Math.cos(angle)*r}px;--ty:${Math.sin(angle)*r}px;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 1000);
    }
  }

  function resetGame() {
    completed = false;
    badge.style.display = 'flex';
    placeInitBadge();
    charEmoji.classList.remove('glow');
    document.getElementById('successOverlay').classList.remove('show');
  }

  badge.addEventListener('mousedown', e => { onStart(e.clientX, e.clientY); e.preventDefault(); });
  window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', onEnd);
  badge.addEventListener('touchstart', e => { onStart(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, {passive:false});
  window.addEventListener('touchmove', e => { if(isDragging){ e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); } }, {passive:false});
  window.addEventListener('touchend', onEnd);
</script>
</body>
</html>
