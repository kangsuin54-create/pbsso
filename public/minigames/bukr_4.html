<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>공통점 찾기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e27;
    color: #f4c95d;
    font-family: 'Segoe UI', sans-serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  .ui-top {
    position: fixed; top: 0; left: 0; right: 0;
    text-align: center; padding: 16px;
    z-index: 10; pointer-events: none;
  }
  .ui-top h1 { font-size: 1.2rem; }
  .ui-top p { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
  #gameCanvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .connected-count {
    position: fixed; bottom: 20px; left: 0; right: 0;
    text-align: center; font-size: 0.9rem; color: #aaa;
    pointer-events: none; z-index: 10;
  }
  .success-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,14,39,0.93);
    flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    gap: 16px;
  }
  .success-overlay.show { display: flex; }
  .success-msg { font-size: 1.4rem; color: #f4c95d; text-align: center; }
  .btn-retry {
    padding: 12px 28px;
    background: #f4c95d;
    color: #0a0e27;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    touch-action: auto;
  }
  .heart {
    position: fixed;
    pointer-events: none;
    font-size: 1.5rem;
    animation: heartFloat 1s ease forwards;
    z-index: 50;
  }
  @keyframes heartFloat {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
  }
</style>
</head>
<body>
<div class="ui-top">
  <h1>🤝 공통점 찾기</h1>
  <p>나와 친구가 공통으로 좋아하는 것을 이어봐요!</p>
</div>
<canvas id="gameCanvas"></canvas>
<div class="connected-count" id="connectedCount">연결: 0개</div>
<div class="success-overlay" id="successOverlay">
  <div style="font-size:3rem;">❤️</div>
  <div class="success-msg">공통점을 찾았어요! 🎉<br>우리는 통해요!</div>
  <button class="btn-retry" onclick="resetGame()">다시 도전! 💪</button>
</div>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  const LEFT_ITEMS  = [{emoji:'🍕',id:'pizza'},{emoji:'🎨',id:'art'},{emoji:'⚽',id:'soccer'},{emoji:'🎮',id:'game'}];
  const RIGHT_ITEMS = [{emoji:'🍕',id:'pizza'},{emoji:'📚',id:'book'},{emoji:'🎨',id:'art'},{emoji:'🎵',id:'music'}];
  const COMMON = new Set(['pizza','art']);
  const ITEM_R = 32;

  let leftPos, rightPos, connections, dragging, dragStart, dragEnd, completed;

  function init() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;

    const topY = H*0.3;
    const gap  = (H*0.45) / 3;
    leftPos  = LEFT_ITEMS.map((it,i)=>({...it, x: W*0.2, y: topY+i*gap}));
    rightPos = RIGHT_ITEMS.map((it,i)=>({...it, x: W*0.8, y: topY+i*gap}));
    connections = [];
    dragging = null; dragStart = null; dragEnd = null;
    completed = false;
    document.getElementById('connectedCount').textContent = '연결: 0개';
    draw();
  }

  function draw() {
    ctx.clearRect(0,0,W,H);

    // labels
    ctx.fillStyle = '#f4c95d';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('나 🙋', W*0.2, H*0.22);
    ctx.fillText('친구 😊', W*0.8, H*0.22);

    // connections
    connections.forEach(c => {
      const l = leftPos.find(p=>p.id===c.lid);
      const r = rightPos.find(p=>p.id===c.rid);
      if (!l||!r) return;
      ctx.beginPath();
      ctx.moveTo(l.x+ITEM_R, l.y);
      ctx.lineTo(r.x-ITEM_R, r.y);
      ctx.strokeStyle = COMMON.has(c.lid) ? '#f4c95d' : '#e74c3c';
      ctx.lineWidth = 3;
      ctx.stroke();
    });

    // drag line
    if (dragging && dragEnd) {
      ctx.beginPath();
      ctx.moveTo(dragging.x+ITEM_R, dragging.y);
      ctx.lineTo(dragEnd.x, dragEnd.y);
      ctx.strokeStyle = '#ffffff55';
      ctx.lineWidth = 2;
      ctx.setLineDash([6,4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // items
    [...leftPos, ...rightPos].forEach(it => {
      const isConn = connections.some(c=>c.lid===it.id||c.rid===it.id);
      ctx.beginPath();
      ctx.arc(it.x, it.y, ITEM_R, 0, Math.PI*2);
      ctx.fillStyle = isConn ? '#1a3a1a' : '#12183a';
      ctx.fill();
      ctx.strokeStyle = isConn ? '#2ecc71' : '#2a3060';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.font = '22px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText(it.emoji, it.x, it.y);
      ctx.textBaseline = 'alphabetic';
    });
  }

  function getPos(e) {
    const t = e.touches ? e.touches[0] : e;
    return {x:t.clientX, y:t.clientY};
  }

  function startDrag(e) {
    const pos = getPos(e);
    for (const it of leftPos) {
      if (Math.hypot(pos.x-it.x, pos.y-it.y) < ITEM_R+8) {
        dragging = it; dragEnd = {x:pos.x, y:pos.y};
        return;
      }
    }
  }

  function moveDrag(e) {
    if (!dragging) return;
    e.preventDefault();
    const pos = getPos(e);
    dragEnd = pos;
    draw();
  }

  function endDrag(e) {
    if (!dragging) return;
    const pos = dragEnd || getPos(e);
    for (const it of rightPos) {
      if (Math.hypot(pos.x-it.x, pos.y-it.y) < ITEM_R+12) {
        const alreadyConn = connections.some(c=>c.lid===dragging.id||c.rid===it.id);
        if (!alreadyConn) {
          connections.push({lid:dragging.id, rid:it.id});
          spawnHeart((dragging.x+it.x)/2, (dragging.y+it.y)/2);
          document.getElementById('connectedCount').textContent = `연결: ${connections.length}개`;
          if (connections.length >= 1) {
            setTimeout(() => {
              if (!completed) {
                completed = true;
                document.getElementById('successOverlay').classList.add('show');
                window.parent.postMessage({ type: 'MINIGAME_COMPLETE', success: true }, '*');
              }
            }, 600);
          }
        }
        break;
      }
    }
    dragging = null; dragEnd = null;
    draw();
  }

  function spawnHeart(x,y) {
    const el = document.createElement('div');
    el.className = 'heart';
    el.textContent = '❤️';
    el.style.cssText = `left:${x}px;top:${y}px;transform:translate(-50%,-50%)`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1100);
  }

  function resetGame() {
    document.getElementById('successOverlay').classList.remove('show');
    init();
  }

  canvas.addEventListener('mousedown', startDrag);
  canvas.addEventListener('mousemove', moveDrag);
  canvas.addEventListener('mouseup', endDrag);
  canvas.addEventListener('touchstart', startDrag, {passive:true});
  canvas.addEventListener('touchmove', moveDrag, {passive:false});
  canvas.addEventListener('touchend', endDrag);
  window.addEventListener('resize', init);
  init();
</script>
</body>
</html>
