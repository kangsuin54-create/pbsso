<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>감정 이름표</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e27;
    color: #f4c95d;
    font-family: 'Arial', sans-serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
    touch-action: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    user-select: none;
  }
  h1 { font-size: 20px; color: #f4c95d; margin-bottom: 4px; }
  #subtitle { font-size: 12px; color: #aaa; margin-bottom: 16px; }
  #match-count { font-size: 14px; color: #aaa; margin-bottom: 16px; }
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: min(360px, 96vw);
  }
  .card {
    aspect-ratio: 1;
    background: #1a2040;
    border: 2px solid #2a3060;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .card .front { display: none; }
  .card .back { display: flex; align-items: center; justify-content: center; font-size: 24px; color: #f4c95d; font-weight: bold; }
  .card.flipped .front { display: flex; }
  .card.flipped .back { display: none; }
  .card.flipped {
    background: #0d1a3a;
    border-color: #f4c95d;
  }
  .card.matched {
    background: #1b5e20;
    border-color: #66bb6a;
    cursor: default;
    animation: matchPop 0.4s ease;
  }
  .card.matched .front { display: flex; }
  .card.matched .back { display: none; }
  .card.wrong {
    animation: wrongShake 0.4s ease;
    border-color: #e53935;
    background: #4a0000;
  }
  @keyframes matchPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes wrongShake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  #feedback { font-size: 16px; margin-top: 16px; min-height: 24px; text-align: center; }
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,14,39,0.92);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
  }
  #overlay.show { display: flex; }
  #overlay h2 { font-size: 26px; color: #f4c95d; margin-bottom: 16px; }
  #overlay p { font-size: 14px; color: #ccc; margin-bottom: 24px; }
  .btn {
    background: #f4c95d; color: #0a0e27;
    border: none; border-radius: 24px;
    padding: 12px 32px; font-size: 16px; font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>
<h1>🃏 감정 이름표</h1>
<div id="subtitle">같은 감정 이모지 ↔ 이름 짝을 찾아요!</div>
<div id="match-count">매칭: <span id="matchNum">0</span> / 4</div>
<div id="grid"></div>
<div id="feedback"></div>

<div id="overlay">
  <h2 id="overlayTitle"></h2>
  <p id="overlayMsg"></p>
  <button class="btn" id="overlayBtn">다시 도전! 💪</button>
</div>

<script>
const PAIRS = [
  { id: 'joy', emoji: '😊', name: '기쁨' },
  { id: 'sad', emoji: '😢', name: '슬픔' },
  { id: 'ang', emoji: '😡', name: '화남' },
  { id: 'fea', emoji: '😨', name: '두려움' },
];

let flipped = [];
let matched = 0;
let locked = false;
let cards = [];
const matchNumEl = document.getElementById('matchNum');
const feedbackEl = document.getElementById('feedback');
const overlay = document.getElementById('overlay');

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildCards() {
  const items = [];
  PAIRS.forEach(p => {
    items.push({ id: p.id, type: 'emoji', display: p.emoji });
    items.push({ id: p.id, type: 'name', display: p.name });
  });
  return shuffle(items);
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards = buildCards();
  flipped = [];
  matched = 0;
  locked = false;
  matchNumEl.textContent = 0;
  feedbackEl.textContent = '';

  cards.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;
    card.dataset.id = item.id;
    card.dataset.type = item.type;

    const front = document.createElement('div');
    front.className = 'front';
    front.textContent = item.display;
    front.style.fontSize = item.type === 'emoji' ? '30px' : '13px';

    const back = document.createElement('div');
    back.className = 'back';
    back.textContent = '?';

    card.appendChild(front);
    card.appendChild(back);

    card.ontouchstart = (e) => { e.preventDefault(); flipCard(i); };
    card.onmousedown = () => flipCard(i);
    grid.appendChild(card);
  });
}

function flipCard(index) {
  if (locked) return;
  if (cards[index].matched) return;

  const cardEls = document.querySelectorAll('.card');
  const cardEl = cardEls[index];

  if (cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;

  cardEl.classList.add('flipped');
  flipped.push(index);

  if (flipped.length === 2) {
    locked = true;
    const [a, b] = flipped;
    const ca = cards[a], cb = cards[b];

    if (ca.id === cb.id && ca.type !== cb.type) {
      // match!
      matched++;
      matchNumEl.textContent = matched;
      feedbackEl.textContent = '✅ 매칭 성공!';
      cards[a].matched = true;
      cards[b].matched = true;
      cardEls[a].classList.add('matched');
      cardEls[b].classList.add('matched');
      flipped = [];
      locked = false;

      if (matched >= 4) {
        setTimeout(() => {
          document.getElementById('overlayTitle').textContent = '감정 마스터! 🎉';
          document.getElementById('overlayMsg').textContent = '모든 감정 짝을 찾았어요!';
          document.getElementById('overlayBtn').style.display = 'none';
          overlay.classList.add('show');
          window.parent.postMessage({ type: 'MINIGAME_COMPLETE', success: true }, '*');
        }, 700);
      }
    } else {
      // wrong
      feedbackEl.textContent = '❌ 다른 감정이에요!';
      cardEls[a].classList.add('wrong');
      cardEls[b].classList.add('wrong');
      setTimeout(() => {
        cardEls[a].classList.remove('flipped', 'wrong');
        cardEls[b].classList.remove('flipped', 'wrong');
        feedbackEl.textContent = '';
        flipped = [];
        locked = false;
      }, 800);
    }
  }
}

document.getElementById('overlayBtn').addEventListener('click', () => {
  overlay.classList.remove('show');
  document.getElementById('overlayBtn').style.display = 'block';
  renderGrid();
});

renderGrid();
</script>
</body>
</html>
