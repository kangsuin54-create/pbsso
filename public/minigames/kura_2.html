<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>따뜻한 보호막</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e27;
    color: #f4c95d;
    font-family: 'Segoe UI', sans-serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  #gameCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
  }
  .ui-top {
    position: fixed; top: 0; left: 0; right: 0;
    text-align: center; padding: 14px;
    z-index: 10; pointer-events: none;
  }
  .ui-top h1 { font-size: 1.2rem; color: #f4c95d; }
  .ui-top p  { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
  .progress-row {
    position: fixed; bottom: 14px; left: 0; right: 0;
    text-align: center; font-size: 0.85rem; color: #aaa;
    pointer-events: none; z-index: 10;
  }
  .success-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,14,39,0.93);
    flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    gap: 16px;
  }
  .success-overlay.show { display: flex; }
  .success-msg { font-size: 1.4rem; color: #f4c95d; text-align: center; }
  .btn-retry {
    padding: 12px 28px;
    background: #f4c95d;
    color: #0a0e27;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    touch-action: auto;
  }
  .glow-overlay {
    display: none;
    position: fixed; inset: 0;
    background: radial-gradient(circle, rgba(244,201,93,0.18) 0%, transparent 70%);
    z-index: 5; pointer-events: none;
    animation: glowPulse 1.5s ease infinite;
  }
  .glow-overlay.show { display: block; }
  @keyframes glowPulse {
    0%,100% { opacity: 0.5; }
    50%  { opacity: 1; }
  }
</style>
</head>
<body>
<div class="ui-top">
  <h1>🛡️ 따뜻한 보호막</h1>
  <p>흩어진 조각을 드래그해서 캐릭터를 감싸줘요!</p>
</div>
<canvas id="gameCanvas"></canvas>
<div class="progress-row" id="progressRow">완성: 0 / 4</div>
<div class="glow-overlay" id="glowOverlay"></div>
<div class="success-overlay" id="successOverlay">
  <div style="font-size:3rem;">🛡️</div>
  <div class="success-msg">보호막 완성! ✨<br>따뜻하게 감싸졌어요!</div>
  <button class="btn-retry" onclick="resetGame()">다시 도전! 💪</button>
</div>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, pieces, slots, dragging, dragOX, dragOY, snapped, completed;
  const SNAP_DIST = 55;
  const COLORS = ['#e74c3c','#3498db','#2ecc71','#9b59b6'];

  // 4 shield segments = quarters of a ring
  function getSlotPos(i, cx, cy, R) {
    const angles = [[-Math.PI/2,0],[0,Math.PI/2],[Math.PI/2,Math.PI],[Math.PI,3*Math.PI/2]];
    const [a1,a2] = angles[i];
    const mid = (a1+a2)/2;
    return { x: cx + Math.cos(mid)*R, y: cy + Math.sin(mid)*R };
  }

  function init() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    snapped = 0; completed = false;
    const cx = W/2, cy = H/2;
    const R = Math.min(W,H)*0.28;
    const pw = 52, ph = 52;

    slots = Array.from({length:4}, (_,i) => {
      const pos = getSlotPos(i, cx, cy, R);
      return { x:pos.x, y:pos.y, w:pw, h:ph, i, filled:false };
    });

    // scatter pieces far from center
    const scatterPts = [
      {x:W*0.1, y:H*0.2}, {x:W*0.82,y:H*0.18},
      {x:W*0.1, y:H*0.78},{x:W*0.80,y:H*0.78}
    ];
    pieces = Array.from({length:4}, (_,i) => ({
      x: scatterPts[i].x - pw/2,
      y: scatterPts[i].y - ph/2,
      w: pw, h: ph, i, snapped: false,
      color: COLORS[i], label: ['↗','↘','↙','↖'][i]
    }));
    dragging = null;
    document.getElementById('progressRow').textContent = '완성: 0 / 4';
    draw();
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    const cx=W/2, cy=H/2;
    const R = Math.min(W,H)*0.28;

    // draw broken ring slots
    slots.forEach((s,i) => {
      const angles = [[-Math.PI/2,0],[0,Math.PI/2],[Math.PI/2,Math.PI],[Math.PI,3*Math.PI/2]];
      const [a1,a2] = angles[i];
      ctx.beginPath();
      ctx.arc(cx,cy,R,a1,a2);
      ctx.strokeStyle = s.filled ? COLORS[i] : '#2a3060';
      ctx.lineWidth = s.filled ? 14 : 7;
      ctx.stroke();
    });

    // character
    ctx.font = `${Math.min(W,H)*0.14}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🧙', cx, cy);

    // snap slot guides
    slots.forEach(s => {
      if (s.filled) return;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 26, 0, Math.PI*2);
      ctx.strokeStyle = '#f4c95d44';
      ctx.lineWidth = 2;
      ctx.setLineDash([5,4]);
      ctx.stroke();
      ctx.setLineDash([]);
    });

    // pieces (not snapped)
    pieces.forEach(p => {
      if (p.snapped) return;
      ctx.save();
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 14;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.roundRect(p.x, p.y, p.w, p.h, 12);
      ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.label, p.x+p.w/2, p.y+p.h/2);
    });
  }

  function getPos(e) {
    const t = e.touches ? e.touches[0] : e;
    return {x: t.clientX, y: t.clientY};
  }

  function startDrag(e) {
    const pos = getPos(e);
    for (let i=pieces.length-1;i>=0;i--) {
      const p = pieces[i];
      if (p.snapped) continue;
      if (pos.x>=p.x&&pos.x<=p.x+p.w&&pos.y>=p.y&&pos.y<=p.y+p.h) {
        dragging=p; dragOX=pos.x-p.x; dragOY=pos.y-p.y;
        pieces.splice(i,1); pieces.push(dragging);
        break;
      }
    }
  }

  function moveDrag(e) {
    if (!dragging) return;
    e.preventDefault();
    const pos = getPos(e);
    dragging.x = Math.max(0, Math.min(W - dragging.w, pos.x - dragOX));
    dragging.y = Math.max(0, Math.min(H - dragging.h, pos.y - dragOY));
    draw();
  }

  function endDrag() {
    if (!dragging) return;
    const s = slots[dragging.i];
    const cx = dragging.x+dragging.w/2;
    const cy = dragging.y+dragging.h/2;
    if (Math.hypot(cx-s.x, cy-s.y) < SNAP_DIST) {
      dragging.snapped = true;
      slots[dragging.i].filled = true;
      snapped++;
      document.getElementById('progressRow').textContent = `완성: ${snapped} / 4`;
      if (snapped >= 4) {
        completed = true;
        document.getElementById('glowOverlay').classList.add('show');
        setTimeout(() => {
          document.getElementById('successOverlay').classList.add('show');
          window.parent.postMessage({ type: 'MINIGAME_COMPLETE', success: true }, '*');
        }, 900);
      }
    }
    dragging = null; draw();
  }

  function resetGame() {
    document.getElementById('successOverlay').classList.remove('show');
    document.getElementById('glowOverlay').classList.remove('show');
    init();
  }

  canvas.addEventListener('mousedown', startDrag);
  canvas.addEventListener('mousemove', moveDrag);
  canvas.addEventListener('mouseup', endDrag);
  canvas.addEventListener('touchstart', startDrag, {passive:true});
  canvas.addEventListener('touchmove', moveDrag, {passive:false});
  canvas.addEventListener('touchend', endDrag);
  window.addEventListener('resize', init);
  init();
</script>
</body>
</html>
