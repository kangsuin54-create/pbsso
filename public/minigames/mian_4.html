<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>노력의 흔적</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e27;
    color: #f4c95d;
    font-family: 'Segoe UI', sans-serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  #gameCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
  }
  .ui-top {
    position: fixed;
    top: 16px; left: 0; right: 0;
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
  .ui-top h1 { font-size: 1.2rem; color: #f4c95d; }
  .ui-top p { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
  .progress-row {
    position: fixed;
    bottom: 20px; left: 0; right: 0;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    color: #aaa;
    font-size: 0.85rem;
  }
  .success-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,14,39,0.93);
    flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    gap: 16px;
  }
  .success-overlay.show { display: flex; }
  .success-msg { font-size: 1.4rem; color: #f4c95d; text-align: center; }
  .btn-retry {
    padding: 12px 28px;
    background: #f4c95d;
    color: #0a0e27;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    touch-action: auto;
  }
  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 1.2rem;
    z-index: 90;
    animation: particleFly 1s ease forwards;
  }
  @keyframes particleFly {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
  }
</style>
</head>
<body>
<div class="ui-top">
  <h1>🧩 노력의 흔적</h1>
  <p>숫자 블록을 드래그해서 퍼즐 판에 맞춰보세요!</p>
</div>
<canvas id="gameCanvas"></canvas>
<div class="progress-row" id="progressRow">완성: 0 / 5</div>
<div class="success-overlay" id="successOverlay">
  <div style="font-size:3rem;">🌟</div>
  <div class="success-msg">퍼즐 완성! 노력이 빛났어요! ✨</div>
  <button class="btn-retry" onclick="resetGame()">다시 도전! 💪</button>
</div>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const COLS = ['#e74c3c','#3498db','#2ecc71','#e67e22','#9b59b6'];
  const LABELS = ['1','2','3','4','5'];
  const SNAP_DIST = 50;

  let W, H, pieces, slots, dragging, dragOffX, dragOffY, snapped, completed;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    initGame();
  }

  function initGame() {
    snapped = 0; completed = false;
    const cxArr = [0.2, 0.4, 0.6, 0.8, 0.5];
    const cyArr = [0.25, 0.7, 0.3, 0.68, 0.5];

    slots = Array.from({length:5}, (_,i) => ({
      x: W*0.5 + (i-2)*62, y: H*0.44, w:52, h:52, label: LABELS[i], color: COLS[i], filled: false
    }));

    pieces = Array.from({length:5}, (_,i) => ({
      x: W*cxArr[i]-26, y: H*cyArr[i]-26, w:52, h:52,
      label: LABELS[i], color: COLS[i], snapped: false, slotIdx: i
    }));
    dragging = null;
    updateProgress();
    draw();
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    // slot bg
    ctx.fillStyle = '#12183a';
    ctx.strokeStyle = '#f4c95d';
    ctx.lineWidth = 2;
    slots.forEach(s => {
      ctx.beginPath();
      ctx.roundRect(s.x-s.w/2, s.y-s.h/2, s.w, s.h, 8);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#f4c95d44';
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(s.label, s.x, s.y);
      ctx.fillStyle = '#12183a';
    });

    // pieces
    pieces.forEach(p => {
      if (p.snapped) return;
      ctx.save();
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 12;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.roundRect(p.x, p.y, p.w, p.h, 10);
      ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.label, p.x+p.w/2, p.y+p.h/2);
    });

    // snapped pieces
    pieces.forEach(p => {
      if (!p.snapped) return;
      const s = slots[p.slotIdx];
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.roundRect(s.x-s.w/2, s.y-s.h/2, s.w, s.h, 10);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.label, s.x, s.y);
    });
  }

  function getPos(e) {
    if (e.touches) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function startDrag(e) {
    const pos = getPos(e);
    for (let i = pieces.length-1; i >= 0; i--) {
      const p = pieces[i];
      if (p.snapped) continue;
      if (pos.x>=p.x && pos.x<=p.x+p.w && pos.y>=p.y && pos.y<=p.y+p.h) {
        dragging = p;
        dragOffX = pos.x - p.x;
        dragOffY = pos.y - p.y;
        pieces.splice(i,1);
        pieces.push(dragging);
        break;
      }
    }
  }

  function moveDrag(e) {
    if (!dragging) return;
    e.preventDefault();
    const pos = getPos(e);
    const r = dragging.w / 2;
    dragging.x = Math.max(0, Math.min(W - dragging.w, pos.x - dragOffX));
    dragging.y = Math.max(0, Math.min(H - dragging.h, pos.y - dragOffY));
    draw();
  }

  function endDrag(e) {
    if (!dragging) return;
    const s = slots[dragging.slotIdx];
    const cx = dragging.x + dragging.w/2;
    const cy = dragging.y + dragging.h/2;
    const dist = Math.hypot(cx-s.x, cy-s.y);
    if (dist < SNAP_DIST) {
      dragging.snapped = true;
      snapped++;
      updateProgress();
      if (snapped >= 5) {
        showParticles();
        setTimeout(() => {
          document.getElementById('successOverlay').classList.add('show');
          window.parent.postMessage({ type: 'MINIGAME_COMPLETE', success: true }, '*');
        }, 800);
      }
    }
    dragging = null;
    draw();
  }

  function updateProgress() {
    document.getElementById('progressRow').textContent = `완성: ${snapped} / 5`;
  }

  function showParticles() {
    const emojis = ['⭐','✨','🌟','💫'];
    for (let i=0;i<12;i++) {
      const el = document.createElement('div');
      el.className = 'particle';
      el.textContent = emojis[i%emojis.length];
      const tx = (Math.random()-0.5)*200;
      const ty = -(Math.random()*180+60);
      el.style.cssText = `left:${Math.random()*80+10}%;top:${Math.random()*60+20}%;--tx:${tx}px;--ty:${ty}px;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1100);
    }
  }

  function resetGame() {
    document.getElementById('successOverlay').classList.remove('show');
    initGame();
  }

  canvas.addEventListener('mousedown', startDrag);
  canvas.addEventListener('mousemove', moveDrag);
  canvas.addEventListener('mouseup', endDrag);
  canvas.addEventListener('touchstart', startDrag, {passive:true});
  canvas.addEventListener('touchmove', moveDrag, {passive:false});
  canvas.addEventListener('touchend', endDrag);

  window.addEventListener('resize', resize);
  resize();
</script>
</body>
</html>
