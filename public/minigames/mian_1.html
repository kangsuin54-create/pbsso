<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>할 일 목록</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e27;
    color: #f4c95d;
    font-family: 'Segoe UI', sans-serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
    touch-action: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 { font-size: 1.4rem; margin-bottom: 6px; text-align: center; }
  .subtitle { font-size: 0.85rem; color: #aaa; margin-bottom: 16px; text-align: center; }
  .input-row {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 12px;
  }
  input[type="text"] {
    flex: 1;
    padding: 10px 14px;
    border-radius: 10px;
    border: 2px solid #f4c95d;
    background: #12183a;
    color: #fff;
    font-size: 1rem;
    outline: none;
    touch-action: auto;
  }
  .btn-add {
    padding: 10px 16px;
    background: #f4c95d;
    color: #0a0e27;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    touch-action: auto;
  }
  .btn-add:active { opacity: 0.8; }
  .list {
    width: 100%;
    max-width: 400px;
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .list-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #12183a;
    border-radius: 10px;
    padding: 12px 14px;
    border: 1px solid #2a3060;
    touch-action: auto;
  }
  .list-item.done .item-text { text-decoration: line-through; color: #666; }
  .checkbox {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 2px solid #f4c95d;
    background: transparent;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1.1rem;
    touch-action: auto;
    -webkit-tap-highlight-color: transparent;
  }
  .checkbox.checked { background: #f4c95d; color: #0a0e27; }
  .item-text { font-size: 0.95rem; color: #ddd; flex: 1; }
  .success-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,14,39,0.92);
    flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    gap: 20px;
  }
  .success-overlay.show { display: flex; }
  .success-msg { font-size: 1.6rem; text-align: center; color: #f4c95d; }
  .btn-retry {
    padding: 12px 28px;
    background: #f4c95d;
    color: #0a0e27;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    touch-action: auto;
  }
  .hint { font-size: 0.8rem; color: #888; text-align: center; margin-top: 4px; }
</style>
</head>
<body>
<h1>📋 할 일 목록</h1>
<p class="subtitle">할 일을 추가하고 체크해봐요!</p>
<div class="input-row">
  <input type="text" id="taskInput" placeholder="할 일을 입력하세요..." maxlength="30" style="touch-action:auto;">
  <button class="btn-add" id="addBtn">추가</button>
</div>
<p class="hint">최소 1개를 추가하고 체크하면 성공!</p>
<div class="list" id="taskList"></div>
<div class="success-overlay" id="successOverlay">
  <div style="font-size:3rem;">⭐</div>
  <div class="success-msg">잘했어! 한 발 내디뎠어! ⭐</div>
  <button class="btn-retry" onclick="resetGame()">다시 도전! 💪</button>
</div>
<script>
  let tasks = [];
  let completed = false;

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;
    tasks.push({ text, done: false, id: Date.now() });
    input.value = '';
    renderList();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.done = !t.done;
    renderList();
    checkSuccess();
  }

  function renderList() {
    const list = document.getElementById('taskList');
    list.innerHTML = '';
    tasks.forEach(t => {
      const item = document.createElement('div');
      item.className = 'list-item' + (t.done ? ' done' : '');
      item.innerHTML = `
        <div class="checkbox ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})">
          ${t.done ? '✓' : ''}
        </div>
        <span class="item-text">${escHtml(t.text)}</span>
      `;
      list.appendChild(item);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function checkSuccess() {
    if (completed) return;
    if (tasks.length >= 1 && tasks.some(t => t.done)) {
      completed = true;
      setTimeout(() => {
        document.getElementById('successOverlay').classList.add('show');
        window.parent.postMessage({ type: 'MINIGAME_COMPLETE', success: true }, '*');
      }, 400);
    }
  }

  function resetGame() {
    tasks = [];
    completed = false;
    renderList();
    document.getElementById('successOverlay').classList.remove('show');
  }

  document.getElementById('addBtn').addEventListener('click', addTask);
  document.getElementById('addBtn').addEventListener('touchend', e => { e.preventDefault(); addTask(); });
  document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
</script>
</body>
</html>
